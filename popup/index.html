<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Noosphere Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 400px;
      min-height: 300px;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: white;
    }
    
    .content {
      padding: 16px;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #1a1a24;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    
    .status-dot.loading { background: #facc15; }
    .status-dot.error { background: #ef4444; }
    
    .page-info {
      font-size: 12px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: #252535;
      border-color: #667eea;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .btn-icon {
      font-size: 18px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a2a3a;
    }
    
    .stat {
      text-align: center;
      padding: 8px;
      background: #1a1a24;
      border-radius: 6px;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
    }
    
    .preview {
      margin-top: 12px;
      padding: 12px;
      background: #1a1a24;
      border-radius: 8px;
      max-height: 150px;
      overflow: hidden;
      font-size: 11px;
      line-height: 1.5;
      color: #999;
    }
    
    .preview-title {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 8px;
    }
    
    .preview-content {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
    }
    
    .hidden { display: none; }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #444;
      border-top: 1px solid #1a1a24;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔮</div>
    <h1>Noosphere Reader</h1>
  </div>
  
  <div class="content">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
    
    <div class="page-info" id="pageInfo">Click to extract current page</div>
    
    <div class="actions">
      <button class="btn btn-primary" id="extractBtn">
        <span class="btn-icon">📖</span>
        Extract Page
      </button>
      
      <button class="btn" id="saveBtn" disabled>
        <span class="btn-icon">💾</span>
        Save to Knowledge Graph
      </button>
      
      <button class="btn" id="copyBtn" disabled>
        <span class="btn-icon">📋</span>
        Copy as Markdown
      </button>
      
      <button class="btn" id="searchBtn">
        <span class="btn-icon">🔍</span>
        Search Knowledge Base
      </button>
    </div>
    
    <div id="previewSection" class="hidden">
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="wordCount">0</div>
          <div class="stat-label">Words</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="entityCount">0</div>
          <div class="stat-label">Entities</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="relCount">0</div>
          <div class="stat-label">Relations</div>
        </div>
      </div>
      
      <div class="preview">
        <div class="preview-title" id="previewTitle"></div>
        <div class="preview-content" id="previewContent"></div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <a href="#" id="openDashboard">Open Dashboard</a> · 
    <span id="nodeCount">0 nodes</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
